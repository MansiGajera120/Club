name: club_app
description: "Sports Club Discovery Platform — mobile app for parents and club owners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.10.0

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Secure storage
  flutter_secure_storage: ^10.3.1

  # Media
  cached_network_image: ^3.4.1
  image_picker: ^1.2.3

  # Push notifications (structure prepared, configured later)
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

  # Social auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

  # Platform integrations
  share_plus: ^13.2.0
  url_launcher: ^6.3.2

  # Utilities
  intl: ^0.20.3
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
