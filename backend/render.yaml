# Render Blueprint — deploy from the repo root or from `backend/` in the dashboard.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: club-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: API_PREFIX
        value: /api/v1
      # Set these in the Render dashboard (or here with sync: false):
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
